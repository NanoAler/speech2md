# =============================================================================
# speech2md — конфигурационный файл
# =============================================================================
# Расположение по умолчанию: ~/.config/speech2md/config.toml
# Можно создать из этого примера:
#   cp config.example.toml ~/.config/speech2md/config.toml
# Или через CLI:
#   speech2md config set <key> <value>
# =============================================================================

# ---------------------------------------------------------------------------
# Whisper / STT
# ---------------------------------------------------------------------------

# Модель faster-whisper: tiny, base, small, medium, large-v3, large-v2, etc.
whisper_model = "small"

# Устройство: "cpu" или "cuda"
device = "cpu"

# Тип вычислений: "int8", "float16", "int8_float16", "float32"
#   Для CPU используйте "int8" (быстрее всего) или "float32" (точнее).
#   Для CUDA используйте "float16" (быстрее) или "int8_float16".
compute_type = "int8"

# Язык распознавания: "ru", "en", "" (пусто = автоопределение)
language = ""

# Размер beam-search (выше = точнее, но медленнее).
#   Рекомендации: 3–5 для скорости, 5–10 для качества.
beam_size = 5

# ---------------------------------------------------------------------------
# LLM (пост-обработка текста)
# ---------------------------------------------------------------------------

# Бэкенд: "ollama" или "openai"
llm_backend = "ollama"

# URL API. Для Ollama: http://localhost:11434
# Для OpenAI: https://api.openai.com/v1
# Можно переопределить через переменную окружения:
#   OLLAMA_URL          — для ollama
#   OPENAI_BASE_URL     — для openai
llm_url = "http://localhost:11434"

# Название модели.
#   Ollama: gemma4, llama3, mistral, qwen2.5, etc.
#   OpenAI: gpt-4o-mini, gpt-4o, gpt-3.5-turbo, etc.
llm_model = "gemma4"

# API-ключ (только для OpenAI).
# Можно задать через переменную окружения OPENAI_API_KEY.
# Внимание: хранение ключа в этом файле — небезопасно.
llm_api_key = ""

# Таймаут запроса к LLM в секундах.
llm_timeout = 120

# Максимальное количество токенов в ответе. 0 = без ограничения.
llm_max_tokens = 0

# ---------------------------------------------------------------------------
# Обработка длинного текста (chunking)
# ---------------------------------------------------------------------------

# Максимальное количество слов в одном чанке для LLM.
#   Если текст короче chunk_size, отправляется целиком.
chunk_size = 2000

# Перекрытие между соседними чанками (в словах).
#   Помогает избежать потери контекста на стыках.
overlap = 200

# ---------------------------------------------------------------------------
# Промпты (шаблоны для LLM)
# ---------------------------------------------------------------------------

# Русскоязычный промпт. {text} заменяется на распознанный текст.
prompt_template_ru = """
Исправь ошибки распознавания речи, не меняя смысл и стиль. Оформи текст как Markdown. Сохрани структуру речи.

{text}
"""

# Англоязычный промпт.
prompt_template_en = """
Fix speech recognition errors without changing meaning or style. Format the text as Markdown. Preserve speech structure.

{text}
"""

# ---------------------------------------------------------------------------
# Вывод результатов
# ---------------------------------------------------------------------------

# Директория для сохранения .md файлов.
#   По умолчанию: ~/.config/speech2md/output/
# output_dir = "/путь/к/директории"

# ---------------------------------------------------------------------------
# VAD (Voice Activity Detection) — для будущего режима реального времени
# ---------------------------------------------------------------------------

vad_threshold = 0.5
vad_min_speech_duration = 0.5
vad_min_silence_duration = 1.0
